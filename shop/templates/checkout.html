{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>

        body{
            font-family: Arial;
            background: #f5f5f5;
        }

        .checkout-box{
            width: 350px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .checkout-box h1{
            margin-bottom: 20px;
        }

        .checkout-box input,
        .checkout-box textarea{
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .checkout-box button{
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            background: black;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .checkout-box button:hover{
            background: #333;
        }

        .total{
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="checkout-box">

    <h1>✨ Checkout</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="name" placeholder="Enter your name" required>

        <input type="email" name="email" placeholder="Enter your email" required>

        <textarea name="address" placeholder="Enter your address" required></textarea>

        <div class="total">
            Total: ₹{{ total }}
        </div>

        <button type="submit">
            Place Order 🛍️
        </button>

    </form>

</div>

</body>
</html>
