{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>

        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
            font-family: Arial;
        }

        .success-box{
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.1);
        }

        .success-box h1{
            color: green;
            margin-bottom: 10px;
        }

        .success-box a{
            text-decoration: none;
        }

        .success-box button{
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
        }

    </style>

</head>

<body>

<div class="success-box">

    <h1>🎉 Order Placed Successfully!</h1>

    <p>Your order is on the way 🚚</p>

    <a href="/">
        <button>Continue Shopping</button>
    </a>

</div>

</body>
</html>
